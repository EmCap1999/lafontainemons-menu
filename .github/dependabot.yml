version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Brussels"
    commit-message:
      prefix: "deps(github-actions):"

  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Brussels"
    commit-message:
      prefix: "deps(node):"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "react-icons"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "@tailwindcss/vite"
      tailwind:
        patterns:
          - "tailwindcss"
          - "tw-animate-css"
      shadcn:
        patterns:
          - "@base-ui/react"
          - "class-variance-authority"
          - "clsx"
          - "tailwind-merge"
          - "lucide-react"
      express:
        patterns:
          - "express"
          - "@types/express"
          - "cors"
          - "@types/cors"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
      tools:
        patterns:
          - "turbo"
          - "@biomejs/*"
      typescript:
        patterns:
          - "typescript"
          - "@types/node"
          - "tsx"
